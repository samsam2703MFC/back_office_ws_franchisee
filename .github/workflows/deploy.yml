name: Deploy to server (SSH / rsync)

# Deploys the franchisee back-office (Claude Design DC app, run natively —
# same architecture as back_office_ws_franchisor) to the client server over
# SSH (rsync). Static site, no build step:
#   index.html (wired copy of back_office_ws_franchisee.dc.html)
#   + support.js (DC runtime) + bo_server.js (data layer, hydrate → /franchisee/*)
#   + api-config.js + _ds/ (design system + fonts) + vendor/ (React UMD) + img/
# Served at  http://<host>/webshop/backoffice_franchisee
#
# Secrets:  SSH_HOST · SSH_USER · SSH_PASSWORD
# Vars:     SSH_PORT (default 22)
#           DEPLOY_DIR absolute server dir mapped to /webshop/backoffice_franchisee
#                      (default /var/www/html/webshop/backoffice_franchisee)
#
#   • rsync runs WITHOUT --delete, so nothing else on the server is wiped.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          rm -rf site && mkdir -p site
          cp index.html back_office_ws_franchisee.dc.html support.js bo_server.js api-config.js site/
          cp -r _ds vendor img site/
          ls -R site | head -50

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Prepare remote directory (validates SSH login)
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh -p ${{ vars.SSH_PORT || '22' }} \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "mkdir -p '${{ vars.DEPLOY_DIR || '/var/www/html/webshop/backoffice_franchisee' }}' && command -v rsync >/dev/null || (echo 'rsync manquant sur le serveur — apt-get install -y rsync'; exit 1)"

      - name: Deploy → ${{ vars.DEPLOY_DIR || '/var/www/html/webshop/backoffice_franchisee' }}
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e rsync -rltDz --omit-dir-times \
            -e "ssh -p ${{ vars.SSH_PORT || '22' }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            site/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ vars.DEPLOY_DIR || '/var/www/html/webshop/backoffice_franchisee' }}/"

      - name: Verify the served page + assets (incl. fonts) on the server
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh -p ${{ vars.SSH_PORT || '22' }} \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" bash -s << 'REMOTE'
          BASE="http://localhost/webshop/backoffice_franchisee"
          DS="_ds/l-atelier-by-8504a4e3-7796-44da-b087-3fbd9dcb8dcd"
          echo "== served page references support.js =="
          curl -fsS "$BASE/" | grep -o './support.js' | head -1 || echo "WARN: support.js ref not found"
          echo "== asset status (code type bytes) =="
          fail=0
          for f in support.js bo_server.js api-config.js vendor/react.js vendor/react-dom.js \
                   $DS/global.css $DS/_ds_bundle.js \
                   $DS/fonts/GC_Vank.ttf $DS/fonts/Gotham_Regular_New.otf \
                   $DS/fonts/Gotham_Medium.otf $DS/fonts/Gotham_Regular.otf \
                   $DS/fonts/Gotham_Black.otf; do
            out=$(curl -s -o /dev/null -w "%{http_code} %{content_type} %{size_download}" "$BASE/$f")
            set -- $out; code=$1; type=$2; size=$3
            echo "  $code  $type  ${size}b  $f"
            case "$f" in
              */fonts/*) if [ "$code" != "200" ] || [ "${size:-0}" -lt 1000 ]; then echo "  ^ FONT NOT OK"; fail=1; fi ;;
              *) if [ "$code" != "200" ]; then echo "  ^ ASSET NOT OK"; fail=1; fi ;;
            esac
          done
          if [ "$fail" = "0" ]; then echo "ALL ASSETS OK"; else echo "ASSET CHECK FAILED"; exit 1; fi
          REMOTE
